syntax = "proto3";

package balance;

import "shared.proto";
import "google/protobuf/empty.proto";

service BalanceService {
  rpc GetMyBalances (GetMyBalancesRequest) returns (GetMyBalancesResponse);
  rpc ValidationAccount (ValidationAccountRequest) returns (google.protobuf.Empty);

  rpc CheckBalance (CheckBalanceRequest) returns (CheckBalanceResponse);
  rpc AuditBalance (AuditBalanceRequest) returns (AuditBalanceResponse);
  rpc DepositAmount (DepositAmountRequest) returns (DepositAmountResponse); 
  rpc WithdrawalAmount (WithdrawalAmountRequest) returns (WithdrawalAmountResponse); 
  rpc TransferAmount (TransferAmountRequest) returns (TransferAmountResponse); 
  rpc PutResetBalanceJob (BalanceResetJobRequest) returns (shared.StringMessage); 
  rpc StartResetBalanceJob (BalanceResetJobRequest) returns (shared.StringMessage); 
  rpc StopResetBalanceJob (BalanceResetJobRequest) returns (shared.StringMessage); 
  rpc ResetAllBalances (google.protobuf.Empty) returns (ResetAllBalancesResponse); 
}

message Balance {
  string amount = 1;
  string currency = 2;
  optional string blocked_at = 3;
}

message GetMyBalancesRequest {
  string account_id = 1;
}

message GetMyBalancesResponse {
  repeated Balance balances = 1;
}

message ValidationAccountRequest {
  string account_id = 1;
  string currency = 2;
}

message CheckBalanceRequest {
  string account_id = 1;
}

message CheckBalanceResponse {
  uint64 amount = 1;
}

message AuditBalanceRequest {
  string account_id = 1;
  string account_id_for_audit = 2;
}

message AuditBalanceResponse {
  string balance = 1;
  string aggregate = 2;
  bool is_consistent = 3;
}

message DepositAmountRequest {
  string account_id = 1;
  string idempotency_key = 2;
  uint64 amount = 3;
}

message DepositAmountResponse {
  string id = 1;
  string amount = 2;
  string type = 3;
  string created_at = 4;
}

message WithdrawalAmountRequest {
  string account_id = 1;
  string idempotency_key = 2;
  uint64 amount = 3;
  string withdrawal_account = 4;
}

message WithdrawalAmountResponse {
  string id = 1;
  string amount = 2;
  string type = 3;
  string withdrawal_account = 4;
  string created_at = 5;
}

message TransferAmountRequest {
  string account_id = 1;
  string idempotency_key = 2;
  uint64 amount = 3;
  string to_account_id = 4;
}

message TransferAmountResponse {
  string id = 1;
  string amount = 2;
  string type = 3;
  string to_account_id = 4;
  string created_at = 5;
}

message BalanceResetJobRequest {
  string account_id = 1;
}

message ResetAllBalancesResponse {
  uint32 reset_counts = 1;
}