version: '3.9'

services:
  postgres: 
    # container_name: postgres
    image: postgres:15
    restart: always
    env_file:
      - .env.development.local
    # environment:
    #   POSTGRES_USER: ${POSTGRES_USER}
    #   POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nestjs-homework

  redis:
    # container_name: redis
    image: redis:6.2
    restart: always
    env_file:
      - .env.development.local
    # command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    networks:
      - nestjs-homework

volumes:
  postgres_data:
  redis_data:

networks:
  nestjs-homework:
    # external: true
      