version: '3.9'
name: nestjs-homework

services:
  postgres: 
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nestjs-homework

  redis:
    image: redis:6.2
    restart: always
    env_file:
      - .env
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    networks:
      - nestjs-homework

  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    env_file:
      - .env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_storage:/data
    networks:
      - nestjs-homework

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - 9092:9092     # для сервисов (внутри docker сети)
      - 9094:9094      # для подключения с хоста (локально)
    env_file:
      - .env
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - nestjs-homework

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - 8080:8080
    env_file:
      - .env
    depends_on:
      - kafka
    networks:
      - nestjs-homework

volumes:
  postgres_data:
  redis_data:
  minio_storage:
  kafka_data:

networks:
  nestjs-homework:
    # external: true
      